backend:
  name: git-gateway
  branch: main

media_folder: assets
public_folder: assets

collections:

  # ── DESIGN & COLORS ────────────────────────────────────────────────────
  - name: design
    label: "🎨 Colors & Design"
    files:
      - name: design
        label: "Colors, Logo & Hero Image"
        file: content/design.json
        format: json
        fields:
          - { label: "Accent Color (Red)", name: accent_color, widget: color, default: "#c41a1a", hint: "Main brand color — buttons, labels, underlines" }
          - { label: "Accent Hover Color", name: accent_hover, widget: color, default: "#a81515" }
          - { label: "Background Color", name: background_color, widget: color, default: "#080808", hint: "Main page background" }
          - { label: "Surface Color", name: surface_color, widget: color, default: "#111111", hint: "Cards and section backgrounds" }
          - { label: "Text Color", name: text_color, widget: color, default: "#e0e8f8" }
          - { label: "Nav Logo", name: nav_logo, widget: image, hint: "Logo shown in the top navigation and footer" }
          - { label: "Hero Background Image", name: hero_image, widget: image, hint: "Full-screen background image on the home page" }
          - { label: "Customer Logo Size (px)", name: customer_logo_size, widget: select, options: ["50", "60", "80", "100", "120", "150"], default: "80", hint: "Height of customer logos in pixels" }
          - { label: "Heading Size Scale (%)", name: heading_scale, widget: select, options: ["80", "90", "100", "110", "120"], default: "100", hint: "Scale all headings — 100% is default" }
          - { label: "Body Text Size (%)", name: body_text_size, widget: select, options: ["85", "90", "100", "110", "120"], default: "100", hint: "Scale body text — 100% is default" }
          - { label: "Hero Watermark Text", name: hero_watermark, widget: string, hint: "Large faded text behind the hero title" }
          - { label: "Hero Overlay Darkness", name: hero_overlay_opacity, widget: select, options: ["0.5", "0.65", "0.75", "0.85", "0.92"], default: "0.75", hint: "How dark the overlay is over the hero image" }


  # ── SITE SETTINGS ──────────────────────────────────────────────────────
  - name: settings
    label: "⚙️ Site Settings"
    files:
      - name: site
        label: "Contact Info & Global Settings"
        file: content/site.json
        format: json
        fields:
          - { label: "Company Name", name: company_name, widget: string }
          - { label: "Email Address", name: email, widget: string }
          - { label: "Phone Number", name: phone, widget: string }
          - { label: "Footer Tagline", name: footer_tagline, widget: string }
          - { label: "Bottom Tagline", name: tagline, widget: string }

  # ── HOME PAGE ──────────────────────────────────────────────────────────
  - name: home
    label: "🏠 Home Page"
    files:
      - name: home
        label: "Home Page Content"
        file: content/home.json
        format: json
        fields:
          - { label: "Eyebrow Text", name: hero_eyebrow, widget: string }
          - { label: "Main Title", name: hero_title, widget: text, hint: "Use \\n for line breaks" }
          - { label: "Subtitle", name: hero_subtitle, widget: text }
          - { label: "Primary Button", name: hero_cta_primary, widget: string }
          - { label: "Secondary Button", name: hero_cta_secondary, widget: string }
          - { label: "What We Do - Title", name: what_we_do_title, widget: string }
          - { label: "What We Do - Text", name: what_we_do_text, widget: text }
          - label: "Capabilities List"
            name: what_we_do_capabilities
            widget: list
            field: { label: "Item", name: item, widget: string }
          - { label: "3D Printing - Title", name: printing_title, widget: string }
          - { label: "3D Printing - Text", name: printing_text, widget: text }
          - { label: "About - Title", name: about_title, widget: string }
          - { label: "About - Paragraph 1", name: about_text1, widget: text }
          - { label: "About - Paragraph 2", name: about_text2, widget: text }
          - { label: "CTA - Title", name: cta_title, widget: string }
          - { label: "CTA - Subtitle", name: cta_subtitle, widget: string }
          - { label: "CTA - Primary Button", name: cta_primary, widget: string }
          - { label: "CTA - Secondary Button", name: cta_secondary, widget: string }
          - { label: "Divider - Label", name: divider_label, widget: string }
          - { label: "Divider - Title", name: divider_title, widget: string }
          - { label: "Divider - Background Image", name: divider_image, widget: image }
          - label: "Gallery Strip (3 photos)"
            name: gallery_strip
            widget: list
            max: 3
            fields:
              - { label: "Photo", name: image, widget: image }
              - { label: "Caption", name: label, widget: string }
          - label: "Industries Served"
            name: industries
            widget: list
            field: { label: "Industry", name: industry, widget: string }


  # ── CUSTOMERS / CLIENTS ────────────────────────────────────────────────
  - name: customers
    label: "🏢 Customers"
    files:
      - name: customers
        label: "Client Logos"
        file: content/customers.json
        format: json
        fields:
          - { label: "Section Title", name: section_title, widget: string, default: "Trusted By" }
          - label: "Customer Logos"
            name: customers
            widget: list
            fields:
              - { label: "Company Name", name: name, widget: string }
              - { label: "Logo", name: logo, widget: image }

  # ── SERVICES PAGE ──────────────────────────────────────────────────────
  - name: services
    label: "🔧 Services Page"
    files:
      - name: services
        label: "Services Content"
        file: content/services.json
        format: json
        fields:
          - { label: "Page Label", name: page_label, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - label: "Services"
            name: services
            widget: list
            fields:
              - { label: "Service ID", name: id, widget: string, hint: "Don't change this" }
              - { label: "Number", name: number, widget: string }
              - { label: "Label", name: label, widget: string }
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }
              - label: "Specs"
                name: specs
                widget: list
                fields:
                  - { label: "Label", name: label, widget: string }
                  - { label: "Value", name: value, widget: string }
              - { label: "Image", name: image, widget: image }

  # ── GALLERY PAGE ───────────────────────────────────────────────────────
  - name: gallery
    label: "🖼️ Gallery"
    files:
      - name: gallery
        label: "Gallery Photos"
        file: content/gallery.json
        format: json
        fields:
          - { label: "Page Label", name: page_label, widget: string }
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Page Description", name: page_description, widget: text }
          - label: "Gallery Items"
            name: items
            widget: list
            fields:
              - { label: "Photo", name: image, widget: image }
              - { label: "Caption", name: label, widget: string }

  # ── CONTACT PAGE ───────────────────────────────────────────────────────
  - name: contact
    label: "📞 Contact Page"
    files:
      - name: contact
        label: "Contact Page Content"
        file: content/contact.json
        format: json
        fields:
          - { label: "Page Title", name: page_title, widget: string }
          - { label: "Page Description", name: page_description, widget: text }
          - { label: "Section Title", name: section_title, widget: string }
          - { label: "Section Text", name: section_text, widget: text }
          - { label: "Email", name: email, widget: string }
          - { label: "Phone", name: phone, widget: string }
          - { label: "Response Time", name: response_time, widget: string }
          - { label: "Divider - Label", name: divider_label, widget: string }
          - { label: "Divider - Title", name: divider_title, widget: string }
          - { label: "Divider - Background Image", name: divider_image, widget: image }
          - label: "Gallery Strip (3 photos)"
            name: gallery_strip
            widget: list
            max: 3
            fields:
              - { label: "Photo", name: image, widget: image }
              - { label: "Caption", name: label, widget: string }
          - label: "Industries Served"
            name: industries
            widget: list
            field: { label: "Industry", name: industry, widget: string }
